name: Build iOS

on:
  push:
  pull_request:
    
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
    - name: Install FlutterFire CLI
      run: dart pub global activate flutterfire_cli
    - run: flutter pub get
    - name: Restore Firebase iOS config
      env:
        IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
      run: |
        if [ -z "$IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
          echo "Missing IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 secret." >&2
          echo "Set it to the base64 encoded contents of ios/Runner/GoogleService-Info.plist." >&2
          exit 1
        fi
        if ! printf '%s' "$IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" | tr -d '[:space:]' | base64 --decode > ios/Runner/GoogleService-Info.plist; then
          echo "Invalid IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 secret." >&2
          echo "Regenerate it with: base64 -i ios/Runner/GoogleService-Info.plist | tr -d '[:space:]'" >&2
          exit 1
        fi
        plutil -lint ios/Runner/GoogleService-Info.plist
    - name: Cache bundler gems
      uses: actions/cache@v5
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Bundler
      run: |
        bundle config path vendor/bundle
        bundle install --jobs 4 --retry 3
    - name: Cache pods
      uses: actions/cache@v5
      with:
        path: ios/Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
        restore-keys: ${{ runner.os }}-pods-
    - run: dart run build_runner build
    - run: dart run slang
    - run: bundle exec flutter build ios --flavor prod --dart-define=FIREBASE_ENABLED=true --no-codesign
